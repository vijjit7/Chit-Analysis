# Railway deployment config. Build from the Dockerfile so the Tesseract
# system package gets installed.
#
# NOTE: We deliberately do NOT set `startCommand` here. Railway passes a
# railway.toml startCommand to the container WITHOUT shell expansion, so a
# literal `$PORT` reaches Streamlit and it crashes ("'$PORT' is not a valid
# integer"). Instead we rely on the Dockerfile's shell-form CMD, which runs
# via `/bin/sh -c` and expands $PORT correctly at runtime.
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
