# Railway deployment config. Tells Railway to build from the Dockerfile
# (so the Tesseract system package gets installed) and how to start the app.
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "streamlit run app.py --server.port=$PORT --server.address=0.0.0.0 --server.headless=true --browser.gatherUsageStats=false"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
